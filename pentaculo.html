<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pentáculo Poético | Xico FaLô!</title>

<style>

body{
font-family: Georgia, serif;
background:#f5f2ed;
margin:0;
padding:0;
color:#1a1a1a;
}

header{
background:#1a1a1a;
color:white;
padding:30px;
text-align:center;
}

header h1{
margin:0;
font-style:italic;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:30px;
}

h2{
color:#b8860b;
}

.elementos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:20px;
}

.botao{
padding:15px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.terra{background:#8B7355;color:white;}
.agua{background:#4682B4;color:white;}
.fogo{background:#B22222;color:white;}
.ar{background:#708090;color:white;}
.eter{background:#6A5ACD;color:white;}

.resultado{
margin-top:30px;
padding:20px;
border-left:5px solid #635BFF;
background:#fafafa;
display:none;
}

textarea{
width:100%;
height:180px;
padding:15px;
font-size:16px;
border-radius:10px;
border:1px solid #ddd;
}

.btn{
margin-top:15px;
padding:15px 30px;
background:#635BFF;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
}

footer{
text-align:center;
padding:40px;
color:#666;
}

</style>

</head>
<body>

<header>
<h1>Pentáculo Poético</h1>
<p>Uma leitura simbólica da alma através da poesia</p>
</header>

<div class="container">

<div class="card">

<h2>Escolha um Elemento</h2>

<p>
Cada elemento representa uma dimensão simbólica da experiência humana.
</p>

<div class="elementos">

<button class="botao terra" onclick="mostrar('terra')">
🌱 Terra
</button>

<button class="botao agua" onclick="mostrar('agua')">
🌊 Água
</button>

<button class="botao fogo" onclick="mostrar('fogo')">
🔥 Fogo
</button>

<button class="botao ar" onclick="mostrar('ar')">
🌬️ Ar
</button>

<button class="botao eter" onclick="mostrar('eter')">
✨ Éter
</button>

</div>

<div id="resultadoElemento" class="resultado"></div>

</div>

<div class="card">

<h2>Diário Poético</h2>

<p>
Escreva livremente. O Pentáculo buscará o elemento predominante.
</p>

<textarea id="texto"></textarea>

<br>

<button class="btn" onclick="analisar()">
Interpretar Escrita
</button>

<div id="resultadoAnalise" class="resultado"></div>

</div>

</div>

<footer>

<p>
Xico FaLô! © 2026
</p>

</footer>

<script>

const elementos = {

terra:{
poema:"Sou raiz que insiste em permanecer mesmo quando os ventos mudam.",
jung:"Necessidade de segurança, estrutura e pertencimento.",
bachelard:"A terra simboliza abrigo, permanência e materialização."
},

agua:{
poema:"Sou água em movimento na nuvem.",
jung:"Expressão emocional e transformação interior.",
bachelard:"A água representa profundidade, sonho e memória."
},

fogo:{
poema:"Viva sua loucura, senão vai se atrofiar.",
jung:"Energia psíquica voltada para mudança e individuação.",
bachelard:"O fogo simboliza desejo, impulso criativo e renovação."
},

ar:{
poema:"Futuro incerto, pensamento em movimento.",
jung:"Busca de sentido e elaboração intelectual.",
bachelard:"O ar representa imaginação, liberdade e transcendência."
},

eter:{
poema:"Entre sonhos e devaneios, habita o invisível.",
jung:"Contato com o Self e símbolos arquetípicos.",
bachelard:"O éter representa a dimensão poética do mistério."
}

};

function mostrar(nome){

let e = elementos[nome];

document.getElementById("resultadoElemento").style.display="block";

document.getElementById("resultadoElemento").innerHTML=

"<h3>"+nome.toUpperCase()+"</h3>"+

"<p><strong>Poema:</strong><br>"+e.poema+"</p>"+

"<p><strong>Jung:</strong><br>"+e.jung+"</p>"+

"<p><strong>Bachelard:</strong><br>"+e.bachelard+"</p>";

}

function analisar(){

let texto =
document.getElementById("texto").value.toLowerCase();

let elemento="ÉTER";

if(
texto.includes("amor") ||
texto.includes("saudade") ||
texto.includes("lágrima") ||
texto.includes("sentimento")
){
elemento="ÁGUA";
}

else if(
texto.includes("luta") ||
texto.includes("raiva") ||
texto.includes("transformação") ||
texto.includes("mudança")
){
elemento="FOGO";
}

else if(
texto.includes("pensamento") ||
texto.includes("futuro") ||
texto.includes("ideia") ||
texto.includes("sonho")
){
elemento="AR";
}

else if(
texto.includes("casa") ||
texto.includes("família") ||
texto.includes("trabalho") ||
texto.includes("corpo")
){
elemento="TERRA";
}

document.getElementById("resultadoAnalise").style.display="block";

document.getElementById("resultadoAnalise").innerHTML=

"<h3>Elemento predominante: "+elemento+"</h3>"+

"<p>Esta é uma interpretação simbólica inicial baseada em palavras-chave presentes na escrita.</p>";

}

</script>

</body>
</html>
