<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pentáculo Poético | Xico FaLô!</title>

<style>

body{
background:#f5f2ed;
font-family:Georgia,serif;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
font-style:italic;
}

.card{
background:white;
padding:30px;
border-radius:15px;
margin-top:30px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

button{
background:#635BFF;
color:white;
border:none;
padding:15px 25px;
border-radius:30px;
cursor:pointer;
margin:10px;
}

.resultado{
margin-top:25px;
padding:20px;
background:#fafafa;
border-left:4px solid #635BFF;
}

</style>
</head>

<body>

<div class="container">

<h1>Pentáculo Poético</h1>

<div class="card">

<h2>Escolha um elemento</h2>

<button onclick="mostrar('fogo')">🔥 Fogo</button>
<button onclick="mostrar('agua')">💧 Água</button>
<button onclick="mostrar('terra')">🌱 Terra</button>
<button onclick="mostrar('ar')">🌬️ Ar</button>
<button onclick="mostrar('eter')">✨ Éter</button>

<div id="resultado" class="resultado"></div>

</div>

</div>

<script>

const elementos = {

fogo:{
poema:"Viva Sua Loucura",
jung:"Transformação e energia psíquica.",
bachelard:"O fogo simboliza paixão e renascimento."
},

agua:{
poema:"Água em Movimento",
jung:"Profundidade emocional.",
bachelard:"A água representa imaginação e fluidez."
},

terra:{
poema:"Soneto Convite",
jung:"Enraizamento e realidade.",
bachelard:"A matéria concreta da experiência."
},

ar:{
poema:"Boemia",
jung:"Pensamento e liberdade.",
bachelard:"O voo da imaginação poética."
},

eter:{
poema:"Aquecimento Global",
jung:"Consciência coletiva.",
bachelard:"Integração dos elementos."
}

};

function mostrar(elemento){

const e = elementos[elemento];

document.getElementById("resultado").innerHTML = `
<h3>${e.poema}</h3>

<p><strong>Leitura Junguiana:</strong><br>
${e.jung}</p>

<p><strong>Leitura Bachelardiana:</strong><br>
${e.bachelard}</p>
`;

}

</script>

</body>
</html>
